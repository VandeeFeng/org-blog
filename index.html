<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'none'; upgrade-insecure-requests">
  <title>Vandee's blog</title>
  <style>
    :root {
      --bg: #1D1F21;
      --fg: #d1d5db;
      --cursor: #cbccc6;
      --green: #86AF80;
      --yellow: #E8AE5B;
      --blue: #6495ED;
      --cyan: #B0C4DE;
      --red: #CD5C5C;
      --muted: #BBAA99;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Iosevka, "Noto Sans CJK SC", "Noto Sans Mono CJK SC", Menlo, Consolas, Monaco, monospace;
      font-size: 14px;
      line-height: 1.55;
    }

    #terminal {
      min-height: 100%;
      padding: 18px 20px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .line { min-height: 1.55em; }
    .prompt { color: var(--green); }
    .path { color: var(--cyan); }
    .cmd { color: var(--fg); }
    .muted { color: var(--muted); }
    .error { color: var(--red); }
    a { color: var(--yellow); text-decoration: underline; }
    a:visited { color: var(--yellow); }

    #input {
      width: 0;
      min-width: 0;
      border: 0;
      padding: 0;
      background: transparent;
      color: transparent;
      font: inherit;
      caret-color: transparent;
      outline: none;
    }

    #cursor {
      display: inline-block;
      width: 0.32em;
      height: 1.1em;
      margin-left: 1px;
      background: var(--cursor);
      vertical-align: -0.15em;
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <main id="terminal" aria-label="terminal"></main>

  <script>
    let posts = null;
    const rootLinks = [
      ["blog", "https://x404.xyz/blog"],
      ["photo", "https://x404.xyz/photo"],
      ["wiki", "https://x404.xyz/wiki"],
      ["project", "blog/projects.html"],
      ["archive", "blog/archive.html"],
    ];

    const ascii = "__     __              _           \n\\ \\   / /_ _ _ __   __| | ___  ___ \n \\ \\ / / _` | '_ \\ / _` |/ _ \\/ _ \\\n  \\ V / (_| | | | | (_| |  __/  __/\n   \\_/ \\__,_|_| |_|\\__,_|\\___|\\___|";

    const terminal = document.getElementById("terminal");
    let cwd = "~";
    let inputEl;
    const commandHistory = [];
    let historyIndex = 0;

    function line(html = "") {
      const div = document.createElement("div");
      div.className = "line";
      div.innerHTML = html;
      terminal.appendChild(div);
      return div;
    }

    function scrollToCurrentLine() {
      requestAnimationFrame(() => {
        inputEl?.parentElement.scrollIntoView({ block: "nearest" });
      });
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      })[char]);
    }

    function safeHref(href) {
      const value = String(href || "").trim();
      if (/^(https?:\/\/|\/|\.{1,2}\/|blog\/)/i.test(value)) return value;
      return "#";
    }

    function link(name, href) {
      const safeUrl = escapeHtml(safeHref(href));
      return `<a href="${safeUrl}" rel="noopener noreferrer">${escapeHtml(name)}</a>`;
    }

    function openPath(name) {
      const item = rootLinks.find(([linkName]) => linkName === name);
      if (!item) return false;
      window.open(safeHref(item[1]), "_blank", "noopener,noreferrer");
      return true;
    }

    function promptHtml(command = "") {
      const path = cwd === "~" ? "" : `<span class="path">/${escapeHtml(cwd.slice(2))}</span>`;
      return `[vandee<span class="prompt">@Matrix</span>]:${path} <span class="cmd">${escapeHtml(command)}</span>`;
    }

    function updateVisibleInput() {
      inputEl.parentElement.querySelector("#visible-input").textContent = inputEl.value;
      inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length);
    }

    function completeInput() {
      const value = inputEl.value;
      const cdMatch = value.match(/^cd\s+([^\s]*)$/);
      const prefix = cdMatch ? cdMatch[1] : value.trim();
      const match = rootLinks.map(([name]) => name).find(name => name.startsWith(prefix));
      if (!match) return;
      inputEl.value = cdMatch ? `cd ${match}` : match;
      updateVisibleInput();
    }

    function renderPrompt() {
      const div = line(`${promptHtml()}<span id="visible-input" class="cmd"></span><input id="input" aria-label="terminal command input" autocomplete="off" autocapitalize="off" spellcheck="false"><span id="cursor"></span>`);
      const visibleInput = div.querySelector("#visible-input");
      inputEl = div.querySelector("#input");
      inputEl.addEventListener("input", () => {
        visibleInput.textContent = inputEl.value;
      });
      inputEl.focus({ preventScroll: true });
      scrollToCurrentLine();
    }

    async function loadPosts() {
      if (posts !== null) return posts;
      const response = await fetch("blog/archive.html");
      if (!response.ok) throw new Error("failed to load archive");
      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, "text/html");
      posts = [...doc.querySelectorAll(".post-title a")].map(anchor => ({
        title: anchor.textContent.trim(),
        href: anchor.getAttribute("href"),
      }));
      return posts;
    }

    async function outputLs() {
      if (cwd === "~/blog") {
        try {
          const loadedPosts = await loadPosts();
          loadedPosts.forEach(post => line(link(post.title, post.href)));
        } catch (_) {
          line('<span class="error">failed to load blog/archive.html</span>');
        }
        return;
      }
      line(rootLinks.map(([name, href]) => link(name, href)).join("    "));
    }

    async function run(command) {
      const cmd = command.trim();
      if (!cmd) return;
      if (cmd === "clear") {
        terminal.textContent = "";
        return;
      }
      if (cmd === "ls") { await outputLs(); return; }
      if (cmd === "help") return line("ls    clear    about    help    cd &lt;path&gt;    cd ..");
      if (cmd === "about") {
        line("Vandee");
        line("搞点摄影，喜欢音乐和艺术，保持热爱。");
        line("如果你也喜欢王小波、李志，我们就是朋友。");
        line("Stay foolish, Stay simple.");
        return;
      }
      if (cmd.startsWith("cd ")) {
        const path = cmd.slice(3).trim();
        if (path === "blog") { cwd = "~/blog"; return; }
        if (path === ".." || path === "~") { cwd = "~"; return; }
        if (cwd === "~" && openPath(path)) return;
        line(`<span class="error">no such file or directory: ${escapeHtml(path)}</span>`);
        return;
      }
      line(`<span class="error">command not found: ${escapeHtml(cmd)}</span>`);
    }

    terminal.addEventListener("keydown", async event => {
      if (!inputEl) return;

      if (event.key === "ArrowUp") {
        event.preventDefault();
        if (historyIndex > 0) historyIndex -= 1;
        inputEl.value = commandHistory[historyIndex] || "";
        updateVisibleInput();
        return;
      }

      if (event.key === "ArrowDown") {
        event.preventDefault();
        if (historyIndex < commandHistory.length) historyIndex += 1;
        inputEl.value = commandHistory[historyIndex] || "";
        updateVisibleInput();
        return;
      }

      if (event.key === "Tab") {
        event.preventDefault();
        completeInput();
        return;
      }

      if (event.key !== "Enter") return;
      event.preventDefault();
      const command = inputEl.value || "";
      const trimmedCommand = command.trim();
      if (trimmedCommand) commandHistory.push(trimmedCommand);
      historyIndex = commandHistory.length;
      inputEl.parentElement.innerHTML = promptHtml(command);
      inputEl = null;
      await run(command);
      renderPrompt();
    });

    document.addEventListener("click", event => {
      if (event.target.closest("a")) return;
      inputEl?.focus({ preventScroll: true });
    });

    line(`<span class="muted">${escapeHtml(ascii)}</span>`);
    line();
    line("type 'help' for commands");
    line();
    renderPrompt();
  </script>
</body>
</html>
